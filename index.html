<!DOCTYPE html>
<html lang="tl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory System</title>

  <link rel="stylesheet" href="style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  
</head>

<div id="loginScreen"
style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#f4f6fb;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
">

<div class="panel" style="width:350px">

<h2>Login</h2>

<input
id="username"
placeholder="Username"
style="margin:10px 0"
/>

<input
id="password"
type="password"
placeholder="Password"
style="margin:10px 0"
/>

<button
class="btn"
onclick="loginUser()">
Login
</button>

</div>

</div>

<body>

  <div class="layout">
    <aside>
      <h1>Inventory System</h1>
      <a href="#" class="active">Dashboard</a>
      <a href="#products">Products</a>
      <a href="#add-stock">Add Stock</a>
      <a href="#sales">Sales / Out</a>
      <a href="#reports">Reports</a>
    </aside>

    <main>
      <div class="topbar">
        <h2>Dashboard</h2>

        <div>
      <button class="btn" onclick="loadProducts()">
      Refresh Data
        </button>

      <button
      class="btn red"
      onclick="logoutUser()">
      Logout
    </button>
      </div>

        </div>

      <div class="cards">
        <div class="card">
          <p>Total Products</p>
          <h3 id="totalProducts">0</h3>
        </div>
        <div class="card">
          <p>Total Stock</p>
          <h3 id="totalStock">0</h3>
        </div>
        <div class="card">
          <p>Low Stock</p>
          <h3 id="lowStock">0</h3>
        </div>
        <div class="card">
          <p>Out of Stock</p>
          <h3 id="outStock">0</h3>
        </div>
      </div>

      <section class="panel" id="add-stock">
        <h3>Add / Update Product</h3>
        <div class="form-grid">
          <input id="barcode" type="text" placeholder="Barcode" oninput="autoFillProduct()" />
          <input id="product" type="text" placeholder="Product Name" />
          <select id="category">
            <option value="">Category</option>
            <option value="2026 Collection">2026 Collection</option>
            <option value="Camille Collection">Camille Collection</option>
            <option value="Pants">Pants</option>
            <option value="Jacket">Jacket</option>
          </select>
          <input id="color" type="text" placeholder="Color" />
          <input id="size" type="text" placeholder="Size" />
          <input id="stock" type="number" placeholder="Quantity" />
          <input id="price" type="number" placeholder="Price" />
          <button class="btn green" onclick="saveProduct()">Save Stock</button>
        </div>
      </section>

      <section class="panel" id="products">
        <h3>Product List</h3>
        <input
    id="searchInput"
    type="text"
    placeholder="Search barcode, product, color, size..."
    oninput="filterProducts()"

    
    style="margin-bottom:15px; max-width:350px;"
  />
        <table>
          <thead>
            <tr>
              <th>Barcode</th>
              <th>Product</th>
              <th>Category</th>
              <th>Color</th>
              <th>Size</th>
              <th>Stock</th>
              <th>Price</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="productTable">
            <tr>
              <td colspan="7">Click Refresh Data.</td>
            </tr>
          </tbody>
        </table>
      </section>

      <section class="panel" id="sales">
        <h3>Sales / Stock Out</h3>
        <div class="form-grid">
          <input id="outBarcode" type="text" placeholder="Scan Barcode" />
          <input id="outQty" type="number" placeholder="Quantity Out" />
          <button class="btn red" onclick="stockOut()">Deduct Stock</button>
        </div>
      </section>

      <section class="panel" id="reports">
  <h3>Reports</h3>
  <div style="height:350px;">
    <canvas id="stockChart"></canvas>
  </div>
</section>
      
    </main>
  </div>

<script src="script.js?v=3"></script>
  
</body>
</html>
