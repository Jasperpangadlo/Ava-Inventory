<!DOCTYPE html>
<html>
<head>
  <title>Barcode Labels</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .labels {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }

    .label {
      border: 1px solid #ccc;
      width: 220px;
      height: 85px;
      text-align: center;
      padding: 5px;
      box-sizing: border-box;
    }
    
    .label img {
      width: 150px;
      height: 28px;
    }
    
    .name {
      font-size: 12px;
      margin-top: 2px;
      font-weight: bold;
    }

   @media print {

.controls{
 display:none !important;
}

.cart-list{
 display:none !important;
}

body{
 margin:0;
 padding:0;
}

.labels{
 gap:2px;
}

.label{
 border: 1px solid #000 !important;
 -webkit-print-color-adjust: exact;
 print-color-adjust: exact;
}

}

    #barcodeSelect,
#qty {

  text-align:center;
  height:32px;
  font-size:16px;

}

    .controls{
display:grid;
grid-template-columns: 250px 100px auto auto auto auto 320px;
gap:8px;
align-items:start;
margin-bottom:15px;
}

#cart{
max-height:90px;
overflow-y:auto;
border:1px solid #ccc;
padding:5px;
font-size:14px;
}

.barcode-code{
font-size:12px;
font-weight:bold;
color:#000;
margin-top:2px;
text-align:center;
}

    
  </style>
</head>

</div>

function generateProductList(){

const datalist=
document.getElementById("products");

productData.forEach(product=>{

product.colors.forEach(color=>{

product.sizes.forEach(size=>{

datalist.innerHTML+=`
<option value="${product.prefix}-${color[0]}-${size}-${product.series}|${product.name} ${color[1]} ${size}">
`;

});

});

});

}

}

function generateLabels(){

   for(let i=0;i<x.qty;i++){

<script>
// ── Print History ─────────────────────────────────────────────────────────

function loadHistory(){
  return JSON.parse(localStorage.getItem("ava_label_history") || "[]");
}

function saveHistory(history){
  localStorage.setItem("ava_label_history", JSON.stringify(history));
}

function addToHistory(cartItems){
  const history = loadHistory();
  const now = new Date().toLocaleString("en-PH");
  cartItems.forEach(x => {
    const [code, name] = x.item.split("|");
    history.unshift({
      datetime: now,
      name: name || code,
      code,
      qty: x.qty
    });
  });
  // Keep only last 200 records
  if(history.length > 200) history.length = 200;
  saveHistory(history);
}

function renderHistory(){
  const history = loadHistory();
  const tbody   = document.getElementById("historyBody");
  const empty   = document.getElementById("historyEmpty");
  const table   = document.getElementById("historyTable");

  if(!history.length){
    empty.style.display = "block";
    table.style.display = "none";
    return;
  }

  empty.style.display = "none";
  table.style.display = "table";

  tbody.innerHTML = history.map((h, i) => `
    <tr style="border-bottom:1px solid #f0e8f8;font-size:13px;${i%2===0?'background:#faf7fc':''}">
      <td style="padding:8px 12px;color:#6b7280;">${h.datetime}</td>
      <td style="padding:8px 12px;font-weight:600;">${h.name}</td>
      <td style="padding:8px 12px;color:#7B5EA7;font-family:monospace;">${h.code}</td>
      <td style="padding:8px 12px;text-align:center;font-weight:700;">${h.qty}</td>
      <td style="padding:8px 12px;text-align:center;">
        <button onclick="reprintItem(${i})"
          style="background:#E8522A;color:white;border:none;border-radius:4px;padding:3px 10px;cursor:pointer;font-size:11px;">
          🖨 Reprint
        </button>
      </td>
    </tr>
  `).join("");
}

function toggleHistory(){
  const panel = document.getElementById("historyPanel");
  const isHidden = panel.style.display === "none";
  panel.style.display = isHidden ? "block" : "none";
  if(isHidden) renderHistory();
}

function clearHistory(){
  if(!confirm("Clear all print history?")) return;
  localStorage.removeItem("ava_label_history");
  renderHistory();
}

function reprintItem(index){
  const history = loadHistory();
  const h = history[index];
  if(!h) return;

  const labels = document.getElementById("labels");
  labels.innerHTML = "";

  for(let i = 0; i < h.qty; i++){
    labels.innerHTML += `
      <div class="label">
        <img src="https://barcode.tec-it.com/barcode.ashx?data=${encodeURIComponent(h.code)}&code=Code128&dpi=300&hidehrt=True">
        <div class="name">${h.name}</div>
        <div class="barcode-code">${h.code}</div>
      </div>`;
  }

  // Scroll to labels and print
  labels.scrollIntoView({ behavior: "smooth" });
  setTimeout(() => window.print(), 600);
}

// ── Override window.print to save history ────────────────────────────────
const _origPrint = window.print.bind(window);
window.print = function(){
  if(cart.length > 0){
    addToHistory(cart);
  }
  _origPrint();
};
</script>
