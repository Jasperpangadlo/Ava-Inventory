<!DOCTYPE html>
<html>
<head>
  <title>Barcode Labels</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .labels {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }

    .label {
      border: 1px solid #ccc;
      width: 220px;
      height: 90px;
      text-align: center;
      padding: 5px;
      box-sizing: border-box;
    }
    
    .label img {
      width: 180px;
      height: 40px;
    }
    
    .name {
      font-size: 12px;
      margin-top: 2px;
      font-weight: bold;
    }

   @media print {

.controls{
 display:none !important;
}

.cart-list{
 display:none !important;
}

body{
 margin:0;
 padding:0;
}

.labels{
 gap:2px;
}

.label{
 border:none;
}

}

    #barcodeSelect,
#qty {

  text-align:center;
  height:32px;
  font-size:16px;

}

    .controls{
display:grid;
grid-template-columns: 250px 100px auto auto auto 320px;
gap:8px;
align-items:start;
margin-bottom:15px;
}

#cart{
max-height:90px;
overflow-y:auto;
border:1px solid #ccc;
padding:5px;
font-size:14px;
}

    
  </style>
</head>
<body>

<div class="controls">
  <input
  id="barcodeSelect"
  list="products"
  placeholder="Search product..."
>

<datalist id="products">
  <option value="ALE-BR-XS-01|Alessandra Brown XS">
  <option value="ALE-BR-S-01|Alessandra Brown S">
  <option value="ALE-BR-M-01|Alessandra Brown M">
  <option value="ALE-BR-L-01|Alessandra Brown L">
  <option value="ALE-BR-XL-01|Alessandra Brown XL">

  <option value="ALE-LI-XS-01|Alessandra Light Blue XS">
  <option value="ALE-LI-S-01|Alessandra Light Blue S">
  <option value="ALE-LI-M-01|Alessandra Light Blue M">
  <option value="ALE-LI-L-01|Alessandra Light Blue L">
  <option value="ALE-LI-XL-01|Alessandra Light Blue XL">

  <option value="CHR-WI-XS-02|Christine Wine Red XS">
  <option value="CHR-WI-S-02|Christine Wine Red S">
  <option value="CHR-WI-M-02|Christine Wine Red M">
  <option value="CHR-WI-L-02|Christine Wine Red L">
  <option value="CHR-WI-XL-02|Christine Wine Red XL">
  
  <option value="CHR-OL-XS-02|Christine Olive XS">
  <option value="CHR-OL-S-02|Christine Olive S">
  <option value="CHR-OL-M-02|Christine Olive M">
  <option value="CHR-OL-L-02|Christine Olive L">
  <option value="CHR-OL-XL-02|Christine Olive XL">

  <option value="ELI-LI-XS-03 |Elie Set Light Blue XS">
  <option value="ELI-LI-S-03 |Elie Set Light Blue S">
  <option value="ELI-LI-S-03 |Elie Set Light Blue M">
  <option value="ELI-LI-S-03 |Elie Set Light Blue L">
  <option value="ELI-LI-S-03 |Elie Set Light Blue XL">

  <option value="ELI-OL-XS-03 |Elie Set Olive XS">
  <option value="ELI-OL-S-03 |Elie Set Olive S">
  <option value="ELI-OL-S-03 |Elie Set Olive M">
  <option value="ELI-OL-S-03 |Elie Set Olive L">
  <option value="ELI-OL-S-03 |Elie Set Olive XL">    

  <option value="ERI-PI-XS-04 |Erin Skirt Olive XS">
  <option value="ERI-PI-S-04 |Erin Skirt Olive S">
  <option value="ERI-PI-M-04 |Erin Skirt Olive M">
  <option value="ERI-PI-L-04 |Erin Skirt Olive L">
  <option value="ERI-PI-XL-04 |Erin Skirt Olive XL">

  //m//
  <option value="BEL-RE-XS-01|Bella Red XS">
  <option value="BEL-RE-S-01|Bella Red S">
  <option value="BEL-RE-M-01|Bella Red M">
  <option value="BEL-RE-L-01|Bella Red L">
  <option value="BEL-RE-XL-01|Bella Red XL">

  <option value="BEL-BL-XS-01|Bella Blue XS">
  <option value="BEL-BL-S-01|Bella Blue S">
  <option value="BEL-BL-M-01|Bella Blue M">
  <option value="BEL-BL-L-01|Bella Blue L">
  <option value="BEL-BL-XL-01|Bella Blue XL">

  
    
</datalist>
  
  <input id="qty" type="number" min="1" value="1">

<button onclick="addItem()">Add</button>
<button onclick="generateLabels()">Generate</button>
<button onclick="clearAll()">Clear</button>
<button onclick="window.print()">Print</button>

<div id="cart" class="cart-list"></div>

</div>

<div class="labels" id="labels"></div>

<script>
let cart=[];

function addItem(){
 const item=document.getElementById("barcodeSelect").value;
 const qty=Number(document.getElementById("qty").value);

 cart.push({item,qty});

 renderCart();
}

function renderCart(){
 const cartDiv=document.getElementById("cart");

 cartDiv.innerHTML=cart.map((x,i)=>{
   const [code,name]=x.item.split("|");

   return `
   <div>
   ${name} — ${x.qty} pcs
   </div>
   `;
 }).join("");
}

function generateLabels(){

 const labels=document.getElementById("labels");

 labels.innerHTML="";

 cart.forEach(x=>{

   const [code,name]=x.item.split("|");

   for(let i=0;i<x.qty;i++){

labels.innerHTML+=`
<div class="label">

<img src="https://barcode.tec-it.com/barcode.ashx?data=${encodeURIComponent(code)}&code=Code128&dpi=300&hidehrt=True">

<div class="name">${name}</div>

</div>
`;

   }

 });

}

function clearAll(){

cart=[];

document.getElementById("cart").innerHTML="";

document.getElementById("labels").innerHTML="";

document.getElementById("barcodeSelect").value="";

document.getElementById("qty").value=1;

}
</script>
</body>
  
</html>
