<!DOCTYPE html>
<html>
<head>
  <title>Barcode Labels</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .labels {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }

    .label {
      border: 1px solid #ccc;
      width: 220px;
      height: 90px;
      text-align: center;
      padding: 5px;
      box-sizing: border-box;
    }
    
    .label img {
      width: 180px;
      height: 40px;
    }
    
    .name {
      font-size: 12px;
      margin-top: 2px;
      font-weight: bold;
    }

    .controls {
  margin-bottom: 15px;
}

    @media print {
      button {
        display: none;
      }

      body {
        padding: 0;
      }
    }
  </style>
</head>
<body>

<div class="controls">
  <select id="barcodeSelect">
    <option value="ALE-BR-XS-01|Alessandra Brown XS">Alessandra Brown XS</option>
    <option value="ALE-BR-S-01|Alessandra Brown S">Alessandra Brown S</option>
    <option value="ALE-BR-M-01|Alessandra Brown M">Alessandra Brown M</option>
    <option value="ALE-BR-M-01|Alessandra Brown L">Alessandra Brown L</option>
    <option value="ALE-BR-M-01|Alessandra Brown XL">Alessandra Brown XL</option>

    <option value="BEL-RE-XS-01|Bella Red XS">Bella Red XS</option>
    <option value="BEL-RE-XS-01|Bella Red S">Bella Red S</option>
    <option value="BEL-RE-XS-01|Bella Red M">Bella Red M</option>
    <option value="BEL-RE-XS-01|Bella Red L">Bella Red L</option>
    <option value="BEL-RE-XS-01|Bella Red XL">Bella Red XL</option>
            <option value="BEL-BL-XS-01|Bella Blue XS">Bella Blue XS</option>
            <option value="BEL-BL-XS-01|Bella Blue S">Bella Blue S</option>
            <option value="BEL-BL-XS-01|Bella Blue M">Bella Blue M</option>
            <option value="BEL-BL-XS-01|Bella Blue L">Bella Blue L</option>
            <option value="BEL-BL-XS-01|Bella Blue XL">Bella Blue XL</option>
  </select>

  <input id="qty" type="number" min="1" value="5">

  <button onclick="generateLabels()">Generate</button>
  <button onclick="window.print()">Print Labels</button>
</div>

<div class="labels" id="labels"></div>

<script>
function generateLabels() {
  const selected = document.getElementById("barcodeSelect").value;
  const qty = Number(document.getElementById("qty").value);

  const [code, name] = selected.split("|");
  const labels = document.getElementById("labels");

  labels.innerHTML = "";

  for (let i = 0; i < qty; i++) {
    labels.innerHTML += `
      <div class="label">
        <img src="https://barcode.tec-it.com/barcode.ashx?data=${encodeURIComponent(code)}&code=Code128&dpi=300&hidehrt=True">
        <div class="name">${name}</div>
      </div>
    `;
  }
}

generateLabels();
</script>
</body>
  
</html>
