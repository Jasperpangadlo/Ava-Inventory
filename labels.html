<!DOCTYPE html>
<html>
<head>
  <title>Barcode Labels</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .labels {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }

    .label {
      border: 1px solid #ccc;
      width: 220px;
      height: 90px;
      text-align: center;
      padding: 5px;
      box-sizing: border-box;
    }
    
    .label img {
      width: 180px;
      height: 40px;
    }
    
    .name {
      font-size: 12px;
      margin-top: 2px;
      font-weight: bold;
    }

   @media print {

.controls{
 display:none !important;
}

.cart-list{
 display:none !important;
}

body{
 margin:0;
 padding:0;
}

.labels{
 gap:2px;
}

.label{
 border:none;
}

}

    #barcodeSelect,
#qty {

  text-align:center;
  height:32px;
  font-size:16px;

}

    .controls{
display:grid;
grid-template-columns: 250px 100px auto auto auto 320px;
gap:8px;
align-items:start;
margin-bottom:15px;
}

#cart{
max-height:90px;
overflow-y:auto;
border:1px solid #ccc;
padding:5px;
font-size:14px;
}

    
  </style>
</head>
<body>

<div class="controls">
  <input
  id="barcodeSelect"
  list="products"
  placeholder="Search product..."
>

  <datalist id="products"></datalist>
  
  <input id="qty" type="number" min="1" value="1">

<button onclick="addItem()">Add</button>
<button onclick="generateLabels()">Generate</button>
<button onclick="clearAll()">Clear</button>
<button onclick="window.print()">Print</button>

<div id="cart" class="cart-list"></div>

</div>

<div class="labels" id="labels"></div>

function generateProductList(){

const datalist=
document.getElementById("products");

productData.forEach(product=>{

product.colors.forEach(color=>{

product.sizes.forEach(size=>{

datalist.innerHTML+=`
<option value="${product.prefix}-${color[0]}-${size}-${product.series}|${product.name} ${color[1]} ${size}">
`;

});

});

});

}

generateProductList();

let cart=[];

function addItem(){
 const item=document.getElementById("barcodeSelect").value;
 const qty=Number(document.getElementById("qty").value);

 cart.push({item,qty});

 renderCart();
}

function renderCart(){
 const cartDiv=document.getElementById("cart");

 cartDiv.innerHTML=cart.map((x,i)=>{
   const [code,name]=x.item.split("|");

   return `
   <div>
   ${name} — ${x.qty} pcs
   </div>
   `;
 }).join("");
}

function generateLabels(){

 const labels=document.getElementById("labels");

 labels.innerHTML="";

 cart.forEach(x=>{

   const [code,name]=x.item.split("|");

   for(let i=0;i<x.qty;i++){

labels.innerHTML+=`
<div class="label">

<img src="https://barcode.tec-it.com/barcode.ashx?data=${encodeURIComponent(code)}&code=Code128&dpi=300&hidehrt=True">

<div class="name">${name}</div>

</div>
`;

   }

 });

}

function clearAll(){

cart=[];

document.getElementById("cart").innerHTML="";

document.getElementById("labels").innerHTML="";

document.getElementById("barcodeSelect").value="";

document.getElementById("qty").value=1;

}
