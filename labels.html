<!DOCTYPE html>
<html>
<head>
  <title>Barcode Labels</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .labels {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
  }

    .label {
      border: 1px solid #ccc;
      width: 220px;
      height: 90px;
      text-align: center;
      padding: 5px;
      box-sizing: border-box;
    }
    
    .label img {
      width: 180px;
      height: 40px;
    }
    
    .name {
      font-size: 12px;
      margin-top: 2px;
      font-weight: bold;
    }

    @media print {
      button {
        display: none;
      }

      body {
        padding: 0;
      }
    }
  </style>
</head>
<body>

<button onclick="window.print()">Print Labels</button>

<div class="labels">

  <div class="label">
    <img src="https://barcode.tec-it.com/barcode.ashx?data=ALE-BR-XS-01&code=Code128&dpi=300&hidehrt=True">
    <div class="name">Alessandra Brown XS</div>
  </div>

  <div class="label">
    <img src="https://barcode.tec-it.com/barcode.ashx?data=ALE-BR-S-01&code=Code128&dpi=300&hidehrt=True">
    <div class="name">Alessandra Brown S</div>
  </div>

  <div class="label">
    <img src="https://barcode.tec-it.com/barcode.ashx?data=ALE-BR-M-01&code=Code128&dpi=300&hidehrt=True">
    <div class="name">Alessandra Brown M</div>
  </div>

</div>

</body>
</html>
